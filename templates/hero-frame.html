  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scene {
    width: 100%;
    height: 100%;
    padding: 60px 120px 80px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    position: relative;
  }

  /* ── Status Bar (top) ── */
  .status-bar {
    position: absolute;
    top: 40px;
    left: 120px;
    right: 120px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-bar .label {
    font-family: 'Space Grotesk', monospace;
    font-size: 11px;
    color: #525252;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .status-bar .counter {
    font-family: 'Space Grotesk', monospace;
    font-size: 11px;
    color: #525252;
  }
  .status-bar .counter span { color: #f5b50a; }

  /* ── Scene Label ── */
  .tag {
    font-family: 'Space Grotesk', monospace;
    font-size: 12px;
    color: #525252;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }

  /* ── Heading ── */
  h1 {
    font-size: 52px;
    font-weight: 600;
    color: #d4d4d4;
    line-height: 1.2;
    margin-bottom: 32px;
    max-width: 80%;
  }
  h1 em { color: #f5b50a; font-style: italic; font-weight: 300; }

  /* ── Body Copy ── */
  p {
    font-size: 22px;
    color: #a3a3a3;
    line-height: 1.6;
    max-width: 75%;
    margin-bottom: 40px;
  }

  /* ── Main Content Area ── */
  .content {
    flex: 1;
    /* Add scene-specific content here */
  }
